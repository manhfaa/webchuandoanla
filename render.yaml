services:
  - type: web
    name: webchuandoanla-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py provision_admin && python manage.py collectstatic --noinput
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 60
    healthCheckPath: /api/health/
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: FRONTEND_ORIGIN
        value: https://agromindai.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://agromindai.vercel.app
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: ^https://.*\.vercel\.app$
      - key: CSRF_TRUSTED_ORIGINS
        value: https://webchuandoanla-backend.onrender.com,https://*.vercel.app
      - key: CNN_API_URL
        value: https://phamducmanh-agromind-cnn-api.hf.space
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_DB_URL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: SEPAY_WEBHOOK_SECRET
        sync: false
      - key: SEPAY_API_KEY
        sync: false
      - key: SEPAY_BANK_CODE
        sync: false
      - key: SEPAY_BANK_NAME
        sync: false
      - key: SEPAY_ACCOUNT_NUMBER
        sync: false
      - key: SEPAY_ACCOUNT_NAME
        sync: false
      - key: SEPAY_PAYMENT_PREFIX
        value: AGM
      - key: SEPAY_WEBHOOK_MAX_AGE_SECONDS
        value: 300
      - key: SEPAY_ORDER_TTL_MINUTES
        value: 30
      - key: SEPAY_SUBSCRIPTION_DAYS
        value: 30
