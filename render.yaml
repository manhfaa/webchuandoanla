services:
  - type: web
    name: leafiq-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 60
    healthCheckPath: /admin/login/
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: FRONTEND_ORIGIN
        value: https://your-vercel-project.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-vercel-project.vercel.app
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: ^https://.*\.vercel\.app$
      - key: CSRF_TRUSTED_ORIGINS
        value: https://leafiq-backend.onrender.com,https://*.vercel.app
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_DB_URL
        sync: false
